<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10092A;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter for avatar -->
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft glow for lines -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Avatar gradient -->
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F6FEB"/>
      <stop offset="100%" style="stop-color:#A371F7"/>
    </linearGradient>
    <!-- Text shimmer gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF"/>
      <stop offset="50%" style="stop-color:#E2E8F0"/>
      <stop offset="100%" style="stop-color:#A371F7"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <!-- Clip for whole svg -->
    <clipPath id="svgClip">
      <rect width="900" height="300" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#svgClip)">

    <!-- Background -->
    <rect width="900" height="300" fill="url(#bgGrad)"/>

    <!-- Subtle grid lines -->
    <g opacity="0.06" stroke="#58A6FF" stroke-width="0.5">
      <line x1="0" y1="60" x2="900" y2="60"/>
      <line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="180" x2="900" y2="180"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="150" y1="0" x2="150" y2="300"/>
      <line x1="300" y1="0" x2="300" y2="300"/>
      <line x1="450" y1="0" x2="450" y2="300"/>
      <line x1="600" y1="0" x2="600" y2="300"/>
      <line x1="750" y1="0" x2="750" y2="300"/>
    </g>

    <!-- Floating particle dots (right side constellation) -->
    <circle cx="620" cy="50" r="2" fill="#58A6FF" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="80" r="1.5" fill="#A371F7" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="45" r="2.5" fill="#58A6FF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="90" r="1.5" fill="#E2E8F0" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="55" r="2" fill="#A371F7" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="140" r="1.5" fill="#58A6FF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="160" r="2" fill="#E2E8F0" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="760" cy="200" r="2.5" fill="#A371F7" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="190" r="1.5" fill="#58A6FF" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="220" r="2" fill="#58A6FF" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="230" r="2" fill="#A371F7" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="670" cy="270" r="1.5" fill="#E2E8F0" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="830" cy="265" r="2" fill="#58A6FF" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Connecting lines between some dots -->
    <line x1="620" y1="50" x2="680" y2="80" stroke="#58A6FF" stroke-width="0.5" opacity="0.2"/>
    <line x1="680" y1="80" x2="740" y2="45" stroke="#A371F7" stroke-width="0.5" opacity="0.2"/>
    <line x1="740" y1="45" x2="800" y2="90" stroke="#58A6FF" stroke-width="0.5" opacity="0.15"/>
    <line x1="800" y1="90" x2="860" y2="140" stroke="#A371F7" stroke-width="0.5" opacity="0.2"/>
    <line x1="860" y1="140" x2="820" y2="190" stroke="#58A6FF" stroke-width="0.5" opacity="0.15"/>
    <line x1="820" y1="190" x2="760" y2="200" stroke="#A371F7" stroke-width="0.5" opacity="0.2"/>
    <line x1="760" y1="200" x2="700" y2="160" stroke="#58A6FF" stroke-width="0.5" opacity="0.15"/>
    <line x1="700" y1="160" x2="640" y2="220" stroke="#A371F7" stroke-width="0.5" opacity="0.2"/>

    <!-- Floating code snippets (right side, subtle) -->
    <text x="630" y="130" fill="#58A6FF" opacity="0.12" font-family="monospace" font-size="11">const build = () =&gt; {</text>
    <text x="650" y="148" fill="#A371F7" opacity="0.12" font-family="monospace" font-size="11">  return success;</text>
    <text x="630" y="166" fill="#58A6FF" opacity="0.12" font-family="monospace" font-size="11">};</text>

    <!-- Glow behind avatar -->
    <ellipse cx="110" cy="150" rx="80" ry="80" fill="#1F6FEB" opacity="0.08" filter="url(#blueGlow)">
      <animate attributeName="rx" values="80;90;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="80;90;80" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="110" cy="150" rx="60" ry="60" fill="#A371F7" opacity="0.06" filter="url(#blueGlow)">
      <animate attributeName="rx" values="60;70;60" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Avatar background circle -->
    <circle cx="110" cy="150" r="58" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <!-- Circular clip for photo -->
    <clipPath id="avatarClip">
      <circle cx="110" cy="150" r="55"/>
    </clipPath>

    <!--
      ============================ AVATAR ============================
      GitHub renders README SVGs as a sandboxed <img>, so EXTERNAL image
      URLs never load. The photo must be embedded as a base64 data URI.

      >>> Select the text  PASTE_YOUR_DATA_URI_HERE  below (keep the
      >>> surrounding quotes) and paste your copied data URI over it.
      >>> It should look like:  data:image/jpeg;base64,/9j/2wCEAAg...
    -->
    <image href="PASTE_YOUR_DATA_URI_HERE" x="55" y="95" width="110" height="110" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>

    <!-- Animated ring around avatar -->
    <circle cx="110" cy="150" r="63" fill="none" stroke="#58A6FF" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 110 150" to="360 110 150" dur="12s" repeatCount="indefinite"/>
    </circle>

    <!-- Online indicator -->
    <circle cx="152" cy="192" r="9" fill="#0D1117"/>
    <circle cx="152" cy="192" r="6" fill="#3FB950">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Accent line left of text -->
    <rect x="190" y="68" width="3" height="164" rx="2" fill="url(#avatarGrad)" opacity="0.8"/>

    <!-- NAME -->
    <text x="210" y="115" fill="url(#nameGrad)" font-family="'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.5">Asiri Harischandra</text>

    <!-- Role -->
    <text x="212" y="148" fill="#8B949E" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="400">Full-Stack Developer &amp; Cloud Enthusiast</text>

    <!-- Blinking cursor after role (typing effect illusion) -->
    <rect x="530" y="133" width="2" height="16" fill="#58A6FF" opacity="1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Location + status row -->
    <text x="212" y="180" fill="#6E7681" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">📍 Sri Lanka</text>
    <text x="290" y="180" fill="#6E7681" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">·</text>
    <text x="302" y="180" fill="#3FB950" font-family="'Segoe UI', system-ui, sans-serif" font-size="13">● Available for work</text>

    <!-- Tech stack pills row -->
    <!-- Next.js pill -->
    <rect x="212" y="198" width="72" height="24" rx="12" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <text x="248" y="215" text-anchor="middle" fill="#E2E8F0" font-family="monospace" font-size="11">Next.js</text>

    <!-- React pill -->
    <rect x="292" y="198" width="56" height="24" rx="12" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <text x="320" y="215" text-anchor="middle" fill="#61DAFB" font-family="monospace" font-size="11">React</text>

    <!-- Node.js pill -->
    <rect x="356" y="198" width="62" height="24" rx="12" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <text x="387" y="215" text-anchor="middle" fill="#3FB950" font-family="monospace" font-size="11">Node.js</text>

    <!-- AWS pill -->
    <rect x="426" y="198" width="88" height="24" rx="12" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <text x="470" y="215" text-anchor="middle" fill="#FF9900" font-family="monospace" font-size="11">AWS Amplify</text>

    <!-- DynamoDB pill -->
    <rect x="522" y="198" width="80" height="24" rx="12" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <text x="562" y="215" text-anchor="middle" fill="#A371F7" font-family="monospace" font-size="11">DynamoDB</text>

    <!-- MongoDB pill -->
    <rect x="610" y="198" width="72" height="24" rx="12" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <text x="646" y="215" text-anchor="middle" fill="#4EA94B" font-family="monospace" font-size="11">MongoDB</text>

    <!-- Current project cards at bottom -->
    <rect x="212" y="240" width="220" height="44" rx="8" fill="#161B22" stroke="#1F6FEB" stroke-width="0.75"/>
    <text x="226" y="258" fill="#8B949E" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">🏢 BUILDING NOW</text>
    <text x="226" y="276" fill="#E2E8F0" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500">HRM System — Enlear</text>

    <rect x="444" y="240" width="220" height="44" rx="8" fill="#161B22" stroke="#A371F7" stroke-width="0.75"/>
    <text x="458" y="258" fill="#8B949E" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">🏠 BUILDING NOW</text>
    <text x="458" y="276" fill="#E2E8F0" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500">Boarding Rental Platform</text>

    <!-- Bottom border accent -->
    <rect x="0" y="293" width="900" height="7" fill="url(#avatarGrad)" opacity="0.7"/>

  </g>
</svg>
